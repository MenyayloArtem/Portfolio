<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="style.css" rel="stylesheet">
</head>
<body>
    <div id="app">
        <nav>
        <div id="mid-block">
            <a href="#" class="nav-item logo">Logo</a>
                <a href="/" class="nav-item">Home</a>
                <a href="/newPost.html" class="nav-item">New post</a>
                <a href="#" class="nav-item">Portfolio</a>
                <a href="#" class="nav-item">Blog</a>
                <a href="#" class="nav-item">Contact us</a>
                <a class="nav-item" href="/login.html">Login</a>
                <a href="#" id="search-btn"></a>
        </div>
    </nav>
    <h2>Редактировать пост</h2>
    <form>
        <div id="row">
            <input type="text"
            class="half" 
            name="title" 
            id="title"
            placeholder="Заголовок"
            :value="post.title"
            >
            <input type="text"
            class="half" 
            name="status" 
            id="status"
            placeholder="Статус"
            :value="post.status"
            >
        </div>
        <textarea name="text"
        id="text"
        :value="post.body"></textarea>
        <button @click='send'>Сохранить</button>
    </form>
    </div>
    
</body>
<script src="https://unpkg.com/vue@next"></script>
<script>
    const App = {
        data(){
            return {
                post : {
                    id : '',
                    title : '',
                    avatarSrc : '',
                    body : ''
                }
            }
        },
        methods : {
            async send(){
            let title = document.getElementById('title').value
            let status = document.getElementById('status').value
            let body = document.getElementById('text').value
            let postId = window.location.pathname.split(':')[1]
            let post = await fetch(`/editPost:${postId}`,{
                method : 'POST',
                headers: {
                'Content-Type': 'application/json'
            },
            body : JSON.stringify({
                title,
                status,
                body
            })
            })
            document.location.href=`/post:${postId}`
            }
        },
        async mounted(){
            let postId = window.location.pathname.split(':')[1]
            let post = await fetch(`/getPost:${postId}`)
            let res = await post.json()
            this.post = res
        }
    }

    Vue.createApp(App).mount('#app')
</script>
