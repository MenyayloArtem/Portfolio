<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="style.css" rel="stylesheet">
</head>
<body>
    <div id="app">
        <nav>
        <div id="mid-block">
            <a href="#" class="nav-item logo">Logo</a>
                <a href="/" class="nav-item">Home</a>
                <a href="/newPost.html" class="nav-item">New post</a>
                <a href="#" class="nav-item">Portfolio</a>
                <a href="#" class="nav-item">Blog</a>
                <a href="#" class="nav-item">Contact us</a>
                <a class="nav-item" href="/login.html">Login</a>
                <a href="#" id="search-btn"></a>
        </div>
    </nav>
    <h2>Редактировать пост</h2>
    <form action="/editPost" method="POST" enctype="multipart/form-data">
        <div id="row">
            <input type="text"
            class="half" 
            name="title" 
            placeholder="Заголовок"
            :value="post.title"
            >
            <input type="text"
            class="half" 
            name="status" 
            placeholder="Статус"
            :value="post.status"
            >
        </div>
        <textarea name="text" :value="post.text"></textarea>
        <input type="submit">
    </form>
    </div>
    
</body>
<script src="https://unpkg.com/vue@next"></script>
<script>
    const App = {
        data(){
            return {
                post : {
                    id : '',
                    title : '',
                    imgPath : '',
                    text : ''
                }
            }
        },
        async mounted(){
            let postId = window.location.pathname.split(':')[1]
            let post = await fetch(`/getPost:${postId}`)
            let res = await post.json()
            this.post = res
            console.log(res)
        }
    }

    Vue.createApp(App).mount('#app')
</script>
<style>
    * {
        box-sizing: border-box;
    }
    body {
        margin: 0 auto;
        padding-left: 25px;
        font-family: Arial, Helvetica, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    .half {
        width: 50%;
    }

    #row {
        display: flex;
    }

    input, textarea {
        width: 80%;
        height: 50px;
        font-size: 20px;
        margin: 10px;
        border-radius: 5px;
        padding: 2px;
    }

    textarea {
        width: 90%;
        height: 400px;
    }
    form {
        border-radius: 10px;
        background: white;
        width: 700px;
        min-height: 650px;
        display: flex;
        flex-direction: column;
        box-shadow: 1px 1px 1px rgb(155, 155, 155);
    }
</style>
</html>
