<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="style.css" rel="stylesheet">
</head>
<body>
    <div id="background">
        <div id="auth-menu">
            <div id="auth-menu-block">
                <h1 id="title-auth">Авторизация</h1>
                <div id="input-auth-block">
<input type="text" class="inputAuth" name="name" id="name"
placeholder="Введите имя"
>
                </div>
                <div id="input-auth-block">
<input type="password" class="inputAuth" id="password"
placeholder="Введите пароль" name="password"
>
                </div>
<button onclick="login()" id="saveBtn">Войти</button>
            </div>
        </div>
        
    </div>
</body>
<style>
    #background {
        display: flex;
        justify-content: center;
        align-items: center;
        width: 100vw;
        height: 100vh;
        background: #22193f;
    }
</style>
<script>
    async function login(){
        let name = document.getElementById('name').value
        let password = document.getElementById('password').value
        console.log(name,password)
        if(!name || !password){
            alert('Введите данные')
            login()
            return
        }
        let auth = await fetch('/auth',{
            method : 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body : JSON.stringify({
                name,
                password
            })
        })
        let res = await auth.json()
        let permission = res.permission
        if(!res.authSusecc){
            alert(res.message)
        } else {
            document.location.href = '/'
        }
    }
</script>
</html>
