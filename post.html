<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="style.css" rel="stylesheet" type="text/css">
    <title>Document</title>
</head>
<body>
    <nav>
        <div id="mid-block">
            <a href="#" class="nav-item logo">Logo</a>
            <a href="/" class="nav-item">Home</a>
            <a href="/newPost.html" class="nav-item">New post</a>
            <a href="#" class="nav-item">Portfolio</a>
            <a href="#" class="nav-item">Blog</a>
            <a href="#" class="nav-item">Contact us</a>
            <a class="nav-item" href="/login.html">Login</a>
            <a href="#" id="search-btn"></a>
        </div>
    </nav>
    <section id="post">
        <div id="post-wrapper">
        <div id="post-content">
            <div class="row">
                <h1>{{ post.title }}</h1>
            <a :href="'/editPost:' + post.id">
                <img v-if="post.canEdit" src="images/edit.png" width="20" height="20">
            </a>
            </div>
            
            <img id="post-img" :src="'uploads/'+post.avatarSrc" width="400">
            <div id="post-text" v-html="post.body"></div>
        </div>
        </div>
    </section>
</body>
<style>
    img {
        max-width: 100%;
    }
</style>
<script src="https://unpkg.com/vue@next"></script>
<script>
    const App = {
        data(){
            return {
                post : {
                    id : 0,
                    title : '',
                    avatarSrc : '',
                    imgPath : '',
                    body : '',
                    text : '',
                    canEdit : false
                }
            }
        },
        async mounted(){
            let postId = window.location.pathname.split(':')[1]
            let post = await fetch(`/getPost:${postId}`)
            let res = await post.json()
            this.post = res
            console.log(this.post.id)
        }
    }

    Vue.createApp(App).mount('#post')
</script>
</html>
